services:
  source-manager:
    build: .
    container_name: yt-source-manager
    restart: unless-stopped
    command: ["/app/scripts/source-manager.sh"]
    environment:
      YOUTUBE_API_KEY: "${YOUTUBE_API_KEY}"
      YOUTUBE_CHANNEL_ID: "${YOUTUBE_CHANNEL_ID}"
      YOUTUBE_TITLE_REGEX: "${YOUTUBE_TITLE_REGEX:-.*}"
      YOUTUBE_ACTIVE_WINDOW_UTC: "${YOUTUBE_ACTIVE_WINDOW_UTC:-}"
      YOUTUBE_POLL_INTERVAL: "${YOUTUBE_POLL_INTERVAL:-600}"
      YTDLP_FORMAT: "${YTDLP_FORMAT:-best[protocol^=m3u8][height<=720]/best[height<=720]/best}"
      STATE_FILE: "/state/current.json"
      COOKIES_FILE: "/cookies/cookies.txt"
    volumes:
      - ./state:/state
      - ./cookies:/cookies

  ingest-worker:
    build: .
    container_name: yt-ingest-worker
    restart: unless-stopped
    command: ["/app/scripts/ingest-worker.sh"]
    depends_on:
      - source-manager
    environment:
      STATE_FILE: "/state/current.json"
      HLS_DIR: "/hls/live"
      HLS_TIME: "${HLS_TIME:-4}"
      HLS_LIST_SIZE: "${HLS_LIST_SIZE:-6}"
      INGEST_RETRY_DELAY: "${INGEST_RETRY_DELAY:-10}"
      STATE_POLL_INTERVAL: "${STATE_POLL_INTERVAL:-5}"
    volumes:
      - ./state:/state:ro
      - ./hls:/hls

  hls-origin:
    image: nginx:alpine
    container_name: local-hls-origin
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HLS_ORIGIN_PORT:-8080}:80"
    volumes:
      - ./hls:/usr/share/nginx/html:ro

  kick-output:
    build: .
    container_name: kick-output
    restart: unless-stopped
    command: ["/app/scripts/kick-output.sh"]
    depends_on:
      - hls-origin
      - ingest-worker
    environment:
      LOCAL_HLS_URL: "${LOCAL_HLS_URL:-http://hls-origin/live/index.m3u8}"
      KICK_URL: "${KICK_URL:-rtmps://fa723fc1b171.global-contribute.live-video.net:443/app}"
      KICK_KEY: "${KICK_KEY}"
      RETRY_DELAY: "${RETRY_DELAY:-60}"
      KICK_TRANSCODE_MODE: "${KICK_TRANSCODE_MODE:-transcode}"
      VIDEO_BITRATE: "${VIDEO_BITRATE:-7500k}"
      AUDIO_BITRATE: "${AUDIO_BITRATE:-160k}"
      FPS: "${FPS:-60}"
      GOP: "${GOP:-120}"
      PRESET: "${PRESET:-veryfast}"
      HWENC_MODE: "${HWENC_MODE:-software}"
      VAAPI_DEVICE: "${VAAPI_DEVICE:-/dev/dri/renderD128}"
