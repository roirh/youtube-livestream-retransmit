services:
  source-manager:
    build: .
    container_name: yt-source-manager
    restart: unless-stopped
    command: ["/app/scripts/source-manager.sh"]
    environment:
      YOUTUBE_CHANNEL_ID: "${YOUTUBE_CHANNEL_ID}"
      YOUTUBE_TITLE_REGEX: "${YOUTUBE_TITLE_REGEX:-.*}"
      YOUTUBE_ACTIVE_WINDOW_UTC: "${YOUTUBE_ACTIVE_WINDOW_UTC:-}"
      YOUTUBE_POLL_INTERVAL: "${YOUTUBE_POLL_INTERVAL:-300}"
      YOUTUBE_PLAYLIST_END: "${YOUTUBE_PLAYLIST_END:-10}"
      YTDLP_FORMAT: "${YTDLP_FORMAT:-best[protocol^=m3u8][height<=720]/best[height<=720]/best}"
      STATE_FILE: "/state/current.json"
      COOKIES_FILE: "/cookies/cookies.txt"
    volumes:
      - ./state:/state
      - ${COOKIES_DIR:-./cookies}:/cookies

  kick-output:
    build: .
    container_name: kick-output
    restart: unless-stopped
    command: ["/app/scripts/kick-output.sh"]
    depends_on:
      - source-manager
    environment:
      STATE_FILE: "/state/current.json"
      STATE_POLL_INTERVAL: "${STATE_POLL_INTERVAL:-30}"
      COOKIES_FILE: "/cookies/cookies.txt"
      YTDLP_FORMAT: "${YTDLP_FORMAT:-best[protocol^=m3u8][height<=720]/best[height<=720]/best}"
      KICK_URL: "${KICK_URL:-rtmps://fa723fc1b171.global-contribute.live-video.net:443/app}"
      KICK_KEY: "${KICK_KEY}"
      RETRY_DELAY: "${RETRY_DELAY:-60}"
      KICK_TRANSCODE_MODE: "${KICK_TRANSCODE_MODE:-transcode}"
      VIDEO_BITRATE: "${VIDEO_BITRATE:-7500k}"
      AUDIO_BITRATE: "${AUDIO_BITRATE:-160k}"
      FPS: "${FPS:-60}"
      GOP: "${GOP:-120}"
      PRESET: "${PRESET:-veryfast}"
      HWENC_MODE: "${HWENC_MODE:-software}"
      VAAPI_DEVICE: "${VAAPI_DEVICE:-/dev/dri/renderD128}"
      VAAPI_DRIVER: "${VAAPI_DRIVER:-}"
    volumes:
      - ./state:/state:ro
      - ${COOKIES_DIR:-./cookies}:/cookies
